<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myntra Bag</title>
    <link rel="stylesheet" href="css/practise2.css">
</head>
<body>
    <button class="bag-button" onclick="cartQuantity++; document.querySelector('#cart-summary').innerText = `Your bag has ${cartQuantity} items`">Add to Bag</button>

    <button class="wish-button" onclick="cartQuantity--;document.querySelector('#cart-summary').innerText = `Your bag has ${cartQuantity} items`">MOVE TO WISHLIST</button>

    <button class="sale-button" onclick="cartQuantity += 2; document.querySelector('#cart-summary').innerText = `Your bag has ${cartQuantity} items`">Add 1+1 sale item</button>
    <h1 id="cart-summary"></h1>

    <script src="script/practise2.js"></script>
</body>
</html>
